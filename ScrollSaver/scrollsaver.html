<html>
    <head>
        <link rel="stylesheet" href="output.css">
        <script src="script.js"></script>
        <script src="save.js"></script>
    </head>
    <body class="w-72 p-4 bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
        <div id="main-view">
            <button id="bookmarks" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg mb-4">View All Bookmarks</button>
            <button id="savePage" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg mb-4">Create Bookmark</button>
            <button id="openInViewer" style="display:none" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg mb-4">Open in ScrollSaver</button>
            <ul id="link" class="flex flex-col gap-2 text-sm justify-center"></ul>
            <div class="flex justify-end mt-3">
                <button id="settingsBtn" class="text-gray-400 hover:text-gray-600">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div id="settings-view" style="display:none" class="p-4">
            <button id="backBtn" class="text-blue-600 hover:text-blue-800 text-sm mb-4">&#8592; Back</button>
            <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-200 cursor-pointer mb-2">
                <input type="checkbox" id="anchorToggle">
                Show anchors when menu is closed
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-200 cursor-pointer">
                <input type="checkbox" id="darkToggle">
                Dark mode
            </label>
        </div>
    </body>
</html>
